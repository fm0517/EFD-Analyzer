<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFDAnalyzer Viewer</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .header h1 { margin: 0; font-size: 18px; }
        .header a {
            color: white; text-decoration: none;
            padding: 8px 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
        }
        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 50px);
        }
        /* Left panel: SVG diagram */
        #svgContainer {
            width: 60%;
            height: 100%;
            position: relative;
            background: #fafafa;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #svgWrapper {
            padding: 20px;
        }
        #svgWrapper svg {
            max-width: 100%;
            height: auto;
            cursor: pointer;
        }
        #svgWrapper svg text {
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #svgWrapper svg text:hover {
            opacity: 0.7;
        }
        #svgWrapper svg .shape {
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #svgWrapper svg .shape:hover {
            opacity: 0.8;
        }
        #loadingOverlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loadingOverlay p { margin-top: 15px; color: #666; }

        /* Right panel: charts */
        #chartPanel {
            width: 40%;
            height: 100%;
            padding: 20px;
            overflow: auto;
            background: #f5f5f5;
            border-left: 2px solid #ddd;
        }
        #chartPanel h2 { margin-top: 0; color: #333; }
        .chart-info {
            background: white; padding: 15px;
            border-radius: 8px; margin-bottom: 20px;
        }
        .chart-info h3 { margin-top: 0; color: #667eea; }
        .chart-container {
            background: white; padding: 15px;
            border-radius: 8px; margin: 10px 0;
        }
        .chart-container img { max-width: 100%; height: auto; }
        .loading { color: #666; font-style: italic; }
        .error {
            color: #d32f2f; background: #ffebee;
            padding: 15px; border-radius: 5px;
        }
        .success {
            color: #388e3c; background: #e8f5e9;
            padding: 15px; border-radius: 5px;
        }
        .no-data { color: #888; text-align: center; padding: 40px; }
        .manual-input {
            background: white; padding: 15px;
            border-radius: 8px; margin-bottom: 15px;
        }
        .manual-input p { margin: 0 0 10px 0; font-size: 14px; color: #555; }
        .manual-input input[type="text"] {
            width: 65%; padding: 10px;
            border: 1px solid #ddd; border-radius: 5px; font-size: 14px;
        }
        .manual-input button {
            background: #4CAF50; color: white;
            padding: 10px 20px; border: none;
            border-radius: 5px; cursor: pointer; font-size: 14px;
        }
        .manual-input button:hover { background: #45a049; }
        .selected-label {
            background: #e8f4f8; padding: 10px 15px;
            border-radius: 5px; margin-bottom: 15px;
            font-size: 14px; color: #333;
            display: none;
        }
        .selected-label strong { color: #667eea; }
        /* Activity list fallback */
        .activity-list {
            padding: 20px; height: 100%; overflow: auto; background: #f9f9f9;
        }
        .activity-list h3 { margin-top: 0; color: #333; }
        .activity-btn {
            display: block; width: 100%;
            padding: 12px 15px; margin-bottom: 6px;
            text-align: left; background: white;
            border: 1px solid #ddd; border-radius: 5px;
            cursor: pointer; font-size: 14px;
            transition: all 0.2s;
        }
        .activity-btn:hover {
            background: #f0f0f0; border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>EFDAnalyzer - Activity Visualization</h1>
        <a href="/">Upload New Files</a>
    </div>

    <div class="container">
        <!-- Left: SVG diagram -->
        <div id="svgContainer">
            <div id="svgWrapper"></div>
            <div id="loadingOverlay">
                <div class="spinner"></div>
                <p>Loading SVG diagram...</p>
            </div>
        </div>

        <!-- Right: Charts -->
        <div id="chartPanel">
            <h2>Activity Chart</h2>
            <div class="selected-label" id="selectedLabel">
                Selected: <strong id="selectedText"></strong>
            </div>
            <div class="manual-input">
                <p>Click a shape in the diagram, or enter activity name:</p>
                <input type="text" id="activityInput" placeholder="e.g., Pending, Berthing, Being Idle..." />
                <button id="viewChartBtn">View Chart</button>
            </div>
            <div id="chartContent">
                <p class="no-data">Click on a shape in the diagram to view its activity data.</p>
            </div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        // ── State ───────────────────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        let svgContent = null;
        let extractedLabels = [];

        // ── DOM refs ────────────────────────────────────────────
        const svgWrapper = document.getElementById('svgWrapper');
        const loadingDiv = document.getElementById('loadingOverlay');
        const chartContent = document.getElementById('chartContent');
        const activityInput = document.getElementById('activityInput');
        const selectedLabel = document.getElementById('selectedLabel');
        const selectedText = document.getElementById('selectedText');

        // ── Guard: no session ───────────────────────────────────
        if (!sessionId) {
            chartContent.innerHTML =
                '<div class="error">No session found. Please <a href="/">upload files</a> first.</div>';
            loadingDiv.innerHTML =
                '<p style="color:#d32f2f;">No session. <a href="/">Go back</a></p>';
            return;
        }

        // ── 1. Fetch SVG from backend ───────────────────────────
        const svgUrl = window.location.origin + '/api/svg/' + encodeURIComponent(sessionId);
        fetch(svgUrl)
            .then(function (r) {
                if (!r.ok) throw new Error('SVG not found');
                return r.json();
            })
            .then(function (data) {
                if (data.error) throw new Error(data.error);
                svgContent = data.svg;
                renderSvg();
            })
            .catch(function (err) {
                console.error('Failed to fetch SVG:', err);
                loadingDiv.innerHTML =
                    '<p style="color:#d32f2f;">Failed to load SVG diagram.<br>' + err.message + '</p>';
                showActivityListFallback();
            });

        // ── 2. Render SVG and extract labels ───────────────────
        function renderSvg() {
            if (!svgContent) return;

            // Inject SVG into wrapper
            svgWrapper.innerHTML = svgContent;
            loadingDiv.style.display = 'none';

            // Extract all text labels from SVG
            extractLabelsFromSvg();

            // Add click handlers to SVG elements
            addClickHandlersToSvg();
        }

        function extractLabelsFromSvg() {
            const svg = svgWrapper.querySelector('svg');
            if (!svg) return;

            const textElements = svg.querySelectorAll('text');
            extractedLabels = [];

            textElements.forEach(function(textEl) {
                const label = textEl.textContent.trim();
                if (label && label.length > 0) {
                    // Check if this label is already in our list
                    const exists = extractedLabels.some(function(l) {
                        return l.text === label;
                    });
                    if (!exists) {
                        extractedLabels.push({
                            text: label,
                            element: textEl
                        });
                    }
                }
            });

            console.log('Extracted labels:', extractedLabels.map(l => l.text));
        }

        function addClickHandlersToSvg() {
            const svg = svgWrapper.querySelector('svg');
            if (!svg) return;

            // Add click handler to all text elements
            const textElements = svg.querySelectorAll('text');
            textElements.forEach(function(textEl) {
                textEl.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const label = textEl.textContent.trim();
                    if (label) {
                        handleLabelClick(label);
                    }
                });
            });

            // Add click handler to shape elements (paths, rects, etc.)
            const shapeElements = svg.querySelectorAll('.shape, path, rect, polygon');
            shapeElements.forEach(function(shapeEl) {
                shapeEl.addEventListener('click', function(e) {
                    e.stopPropagation();
                    // Try to find associated text element
                    const parentG = shapeEl.closest('g');
                    if (parentG) {
                        const textEl = parentG.querySelector('text');
                        if (textEl) {
                            const label = textEl.textContent.trim();
                            if (label) {
                                handleLabelClick(label);
                                return;
                            }
                        }
                    }
                    // If no text found, try getting title or id
                    const label = shapeEl.id || '';
                    if (label) {
                        handleLabelClick(label);
                    }
                });
            });
        }

        // ── 3. Handle label click ────────────────────────────────
        function handleLabelClick(label) {
            // Clean up the label (remove extra whitespace)
            label = label.replace(/\s+/g, ' ').trim();

            if (!label) return;

            // Show selection indicator
            selectedText.textContent = label;
            selectedLabel.style.display = 'block';
            activityInput.value = label;

            // Fetch activity data
            fetchActivityData(label);
        }

        // ── 4. Fallback: show activity list ─────────────────────
        function showActivityListFallback() {
            // Fetch session info to get activity list
            fetch('/api/session/' + encodeURIComponent(sessionId))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.activities && data.activities.length > 0) {
                        showActivityButtons(data.activities);
                    } else {
                        svgWrapper.innerHTML =
                            '<div style="padding:30px;text-align:center;">' +
                            '<p>No activities found.</p></div>';
                    }
                })
                .catch(function() {
                    svgWrapper.innerHTML =
                        '<div style="padding:30px;text-align:center;">' +
                        '<p>Could not load diagram.</p></div>';
                });
        }

        function showActivityButtons(activities) {
            var html = '<div class="activity-list">' +
                '<h3>Available Activities</h3>' +
                '<p style="color:#666;margin-bottom:15px;font-size:13px;">' +
                'Select an activity to view its chart:</p>';
            for (var i = 0; i < activities.length; i++) {
                html += '<button class="activity-btn" data-label="' +
                    activities[i].replace(/"/g, '&quot;') + '">' +
                    activities[i] + '</button>';
            }
            html += '</div>';
            svgWrapper.innerHTML = html;

            // Attach click handlers
            var btns = svgWrapper.querySelectorAll('.activity-btn');
            for (var j = 0; j < btns.length; j++) {
                btns[j].addEventListener('click', function() {
                    var lbl = this.getAttribute('data-label');
                    activityInput.value = lbl;
                    fetchActivityData(lbl);
                });
            }
        }

        // ── 5. Manual input ─────────────────────────────────────
        document.getElementById('viewChartBtn').addEventListener('click', function () {
            var val = activityInput.value.trim();
            if (val) fetchActivityData(val);
        });
        activityInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                var val = activityInput.value.trim();
                if (val) fetchActivityData(val);
            }
        });

        // ── 6. Fetch activity chart from backend ────────────────
        function fetchActivityData(label) {
            chartContent.innerHTML =
                '<p class="loading">Processing: &quot;' + escapeHtml(label) + '&quot;...</p>';

            fetch('/process-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId, label: label })
            })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.success) {
                    var html = '<div class="chart-info">' +
                        '<h3>Selected: ' + escapeHtml(data.label) + '</h3>' +
                        '<p><strong>Activity:</strong> ' + escapeHtml(data.activity_name) + '</p>' +
                        '</div>';

                    if (data.chart_image) {
                        html += '<div class="chart-container">' +
                            '<img src="' + data.chart_image + '" alt="Activity Chart">' +
                            '</div>';
                    }
                    chartContent.innerHTML = html;
                } else {
                    chartContent.innerHTML = '<div class="error">' + escapeHtml(data.message) + '</div>';
                }
            })
            .catch(function (err) {
                chartContent.innerHTML = '<div class="error">Error: ' + escapeHtml(err.message) + '</div>';
            });
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str || ''));
            return div.innerHTML;
        }

        // Expose for debugging
        window.EFDAnalyzer = { fetchActivityData: fetchActivityData };
    })();
    </script>
</body>
</html>
